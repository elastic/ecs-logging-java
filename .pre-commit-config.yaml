repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-case-conflict
    -   id: check-executables-have-shebangs
    -   id: check-merge-conflict

-   repo: https://github.com/elastic/apm-pipeline-library
    rev: current
    hooks:
    -   id: check-bash-syntax
